name: Prepare Extension Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "major, minor, patch, or an exact Chrome-compatible x.y.z version"
        required: true
        default: patch
        type: string
      release_notes:
        description: "Markdown changelog entries for this extension release"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: prepare-extension-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Version, changelog, and tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare release files
        id: prepare
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          VERSION="$(node scripts/prepare-extension-release.mjs)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Ensure release tag does not exist
        run: |
          TAG="v${{ steps.prepare.outputs.version }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi

      - name: Commit and push release tag
        env:
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/package.json CHANGELOG.md
          git commit -m "chore: release extension v${VERSION}"
          git tag -a "v${VERSION}" -m "Pi Notification Extension v${VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${VERSION}"
