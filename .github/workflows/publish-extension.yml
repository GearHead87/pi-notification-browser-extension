name: Publish Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: publish-extension-${{ github.ref_name }}
  cancel-in-progress: false

env:
  BPP_KEYS: ${{ secrets.BPP_KEYS }}
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  PACKAGE_MANAGER_VERSION: 10.33.0

jobs:
  publish:
    name: Prepare, build, and publish extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Resolve release version
        id: resolve
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          VERSION="${TAG_NAME#v}"

          if [ "${TAG_NAME}" = "${VERSION}" ]; then
            echo "Release tags must start with v, for example v1.2.3."
            exit 1
          fi

          if ! [[ "${VERSION}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Release tag ${TAG_NAME} must be Chrome-compatible semver, for example v1.2.3."
            exit 1
          fi

          git fetch --force origin \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}" \
            "+refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"

          TAG_COMMIT="$(git rev-parse "${TAG_NAME}^{commit}")"
          BRANCH_COMMIT="$(git rev-parse "origin/${DEFAULT_BRANCH}")"
          TAG_PACKAGE_VERSION="$(git show "${TAG_COMMIT}:extension/package.json" | node -e "const fs = require('node:fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8')).version)")"

          if [ "${TAG_PACKAGE_VERSION}" = "${VERSION}" ] && git show "${TAG_COMMIT}:CHANGELOG.md" | grep -q "^## \\[${VERSION}\\]"; then
            git checkout --detach "${TAG_COMMIT}"
            echo "prepared=true" >> "${GITHUB_OUTPUT}"
            echo "RELEASE_COMMIT=${TAG_COMMIT}" >> "${GITHUB_ENV}"
          else
            if [ "${TAG_COMMIT}" != "${BRANCH_COMMIT}" ]; then
              echo "Tag ${TAG_NAME} points at ${TAG_COMMIT}, but ${DEFAULT_BRANCH} is ${BRANCH_COMMIT}."
              echo "Push release tags from the latest ${DEFAULT_BRANCH} commit."
              exit 1
            fi

            git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"
            echo "prepared=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "TAG_NAME=${TAG_NAME}" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "ASSET_NAME=pi-notification-overlay-v${VERSION}.zip" >> "${GITHUB_ENV}"

      - name: Find previous release tag
        id: previous
        if: ${{ steps.resolve.outputs.prepared != 'true' }}
        run: |
          set -euo pipefail

          TAG_COMMIT="$(git rev-parse "${TAG_NAME}^{commit}")"
          PREVIOUS_TAG="$(git tag --merged "${TAG_COMMIT}" --sort=-v:refname --list 'v[0-9]*.[0-9]*.[0-9]*' | grep -v -x "${TAG_NAME}" | head -n 1 || true)"
          echo "tag=${PREVIOUS_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        if: ${{ steps.resolve.outputs.prepared != 'true' }}
        run: |
          set -euo pipefail

          FROM_ARGS=()
          if [ -n "${{ steps.previous.outputs.tag }}" ]; then
            FROM_ARGS=(--from "${{ steps.previous.outputs.tag }}")
          fi

          node scripts/generate-extension-release-notes.mjs \
            --version "${VERSION}" \
            "${FROM_ARGS[@]}" \
            --to "${TAG_NAME}^{commit}" \
            --output "${RUNNER_TEMP}/generated-release-notes.md"

      - name: Commit release files and retarget tag
        if: ${{ steps.resolve.outputs.prepared != 'true' }}
        run: |
          set -euo pipefail

          node scripts/prepare-extension-release.mjs \
            --version "${VERSION}" \
            --notes-file "${RUNNER_TEMP}/generated-release-notes.md"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extension/package.json CHANGELOG.md

          if git diff --cached --quiet; then
            echo "Release preparation did not change extension/package.json or CHANGELOG.md."
            exit 1
          fi

          git commit -m "chore: release extension v${VERSION}"
          git tag -fa "${TAG_NAME}" -m "Pi Notification Extension v${VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
          git push --force origin "refs/tags/${TAG_NAME}"
          echo "RELEASE_COMMIT=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PACKAGE_MANAGER_VERSION }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build:extension

      - name: Package extension zip
        run: pnpm package:extension

      - name: Prepare release asset
        run: |
          ZIP_SOURCE="extension/build/chrome-mv3-prod.zip"
          if [ ! -f "${ZIP_SOURCE}" ]; then
            ZIP_SOURCE="$(find extension/build -maxdepth 1 -name '*.zip' -print -quit)"
          fi

          if [ -z "${ZIP_SOURCE}" ] || [ ! -f "${ZIP_SOURCE}" ]; then
            echo "Could not find packaged extension zip in extension/build."
            exit 1
          fi

          mkdir -p dist
          cp "${ZIP_SOURCE}" "dist/${ASSET_NAME}"

      - name: Extract release notes
        run: node scripts/extract-extension-release-notes.mjs --version "${VERSION}" --output "${RUNNER_TEMP}/release-notes.md"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: dist/${{ env.ASSET_NAME }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "dist/${ASSET_NAME}" --clobber
            gh release edit "${TAG_NAME}" \
              --title "Pi Notification Extension v${VERSION}" \
              --notes-file "${RUNNER_TEMP}/release-notes.md"
          else
            gh release create "${TAG_NAME}" "dist/${ASSET_NAME}" \
              --verify-tag \
              --title "Pi Notification Extension v${VERSION}" \
              --notes-file "${RUNNER_TEMP}/release-notes.md"
          fi

      - name: Publish to browser stores
        if: ${{ env.BPP_KEYS != '' }}
        uses: PlasmoHQ/bpp@v3
        with:
          keys: ${{ env.BPP_KEYS }}
          artifact: dist/${{ env.ASSET_NAME }}
          version-file: extension/package.json
